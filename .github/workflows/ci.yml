name: "CI - Quality & Preview"

on:
  push: 
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

env:
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  GOOGLE_BOOKS_API_KEY: ${{ secrets.GOOGLE_BOOKS_API_KEY }}

jobs:
  quality:
    name: 🔍 Lint & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      
      - name: Install
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Lint & Typecheck
        run: |
          npm run lint
          npx tsc --noEmit

      - name: Unit Tests
        run: npx vitest run --project unit --coverage --passWithNoTests

  preview:
    name: 🚀 Vercel Preview
    runs-on: ubuntu-latest
    needs: quality
    outputs:
      preview_url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      
      - name: Install & Prisma
        run: |
          npm ci
          npx prisma generate

      - name: Deploy Preview to Vercel
        id: deploy
        run: |
          # Executa o deploy e captura a URL gerada
          URL=$(npx vercel deploy --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Comment PR
        uses: thollander/actions-comment-pull-request@v2
        with:
          message: |
            🚀 Preview disponível em: ${{ steps.deploy.outputs.url }}
            🔍 Analisando testes E2E com Cypress...
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  e2e-cypress:
    name: 🌲 Cypress E2E
    runs-on: ubuntu-latest
    needs: preview
    steps:
      - uses: actions/checkout@v4
      
     
      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          
          config: baseUrl=${{ needs.preview.outputs.preview_url }}
          browser: chrome
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}